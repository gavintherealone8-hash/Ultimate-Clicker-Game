<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Clicker Game</title>

<style>
body { font-family: Arial; background:#1e1e1e; color:#fff; margin:0; padding:0; overflow:hidden;}

#login{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;padding:30px;border-radius:10px;border:2px solid #ffcc00;text-align:center;width:300px;}
input{padding:8px;width:80%;margin-bottom:10px;border-radius:5px;border:none;}
button{padding:10px 20px;margin:5px;cursor:pointer;border:none;border-radius:5px;background:#ffcc00;font-weight:bold;}

#game-ui{display:none;padding:20px;text-align:center;}

#hud{display:none;position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.7);border:2px solid #ffcc00;border-radius:10px;padding:10px;width:180px;text-align:left;cursor:move;}
#hud p{margin:5px 0;font-weight:bold;}

#sprite{width:100px;height:100px;background:#ff4444;margin:20px auto;cursor:pointer;position:relative;}

#menu button{display:block;width:200px;margin:10px auto;background:#00ccff;color:#000;font-size:18px;}

.particle{position:absolute;width:10px;height:10px;background:#ff00ff;border-radius:50%;animation:fall 2s linear infinite;}
@keyframes fall{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(500px);opacity:0;}}

#secret-code{display:none;position:fixed;top:50px;right:10px;width:200px;background:rgba(0,0,0,0.85);border:2px solid #00ff00;border-radius:10px;padding:10px;text-align:center;cursor:move;}

.pin-button{width:40px;height:40px;margin:5px;background:#00ccff;border:none;border-radius:5px;cursor:pointer;}

#admin-panel{display:none;position:fixed;top:50px;left:50%;transform:translateX(-50%);width:280px;max-height:400px;overflow-y:auto;background:rgba(0,0,0,0.95);border:2px solid #ff00ff;border-radius:10px;padding:20px;text-align:center;cursor:move;}

#admin-close{position:absolute;top:5px;right:5px;background:red;border:none;color:white;width:30px;height:30px;}

/* 🌈 SHOUTOUT */
#shoutout{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: rainbowMove 5s linear infinite;
}
@keyframes rainbowMove{
  0%{background-position:0%;}
  100%{background-position:100%;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="username" placeholder="Username"><br>
<button onclick="login()">Login</button>
</div>

<!-- GAME -->
<div id="game-ui">
<button onclick="clickSprite()">Click</button>
<button onclick="upgradeClick()">Upgrade</button>
<button onclick="openLootBox()">Loot Box</button>
<div id="sprite" onclick="clickSprite()"></div>
</div>

<!-- HUD -->
<div id="hud">
<p id="hud-username"></p>
<p id="hud-points"></p>
<p id="hud-coins"></p>
<p id="hud-gems"></p>
<p id="hud-multiplier"></p>
</div>

<!-- SECRET -->
<div id="secret-code">
<input id="pin-input" readonly><br>
<button class="pin-button" onclick="pressPin('1')">1</button>
<button class="pin-button" onclick="pressPin('2')">2</button>
<button class="pin-button" onclick="pressPin('3')">3</button><br>
<button class="pin-button" onclick="pressPin('4')">4</button>
<button class="pin-button" onclick="pressPin('5')">5</button>
<button class="pin-button" onclick="pressPin('6')">6</button><br>
<button onclick="submitPin()">OK</button>
</div>

<!-- ADMIN -->
<div id="admin-panel">
<button id="admin-close" onclick="closeAdminPanel()">X</button>
<input id="admin-points" placeholder="Points"><br>
<input id="admin-coins" placeholder="Coins"><br>
<input id="admin-gems" placeholder="Gems"><br>
<button onclick="applyAdminChanges()">Apply</button>
</div>

<!-- 🌈 SHOUTOUT -->
<div id="shoutout">shoutout to ms.jojo</div>

<script>
let player={username:'',points:0,coins:0,gems:0,clickMultiplier:1};

function save(){localStorage.setItem('game',JSON.stringify(player))}
function load(){let d=localStorage.getItem('game');if(d){player=JSON.parse(d)}}

function updateHUD(){
hud-username.textContent="Player: "+player.username
hud-points.textContent="Points: "+player.points
hud-coins.textContent="Coins: "+player.coins
hud-gems.textContent="Gems: "+player.gems
hud-multiplier.textContent="x"+player.clickMultiplier
save()
}

function login(){
player.username=username.value
login.style.display="none"
game-ui.style.display="block"
hud.style.display="block"
secret-code.style.display="block"
updateHUD()
}

function clickSprite(){
player.points+=player.clickMultiplier
updateHUD()
}

function upgradeClick(){
player.clickMultiplier*=2
updateHUD()
}

function openLootBox(){
let r=Math.random()
if(r<0.5){player.coins+=100}else{player.gems+=1}
updateHUD()
}

function pressPin(n){pin-input.value+=n}
function submitPin(){
if(pin-input.value=="1234"){admin-panel.style.display="block"}
pin-input.value=""
}

function applyAdminChanges(){
player.points=parseInt(admin-points.value)||player.points
player.coins=parseInt(admin-coins.value)||player.coins
player.gems=parseInt(admin-gems.value)||player.gems
updateHUD()
}

function closeAdminPanel(){admin-panel.style.display="none"}

window.onload=()=>{load();if(player.username){login();}}
</script>

</body>
</html>
